CONFIG_ZMK_KEYBOARD_NAME="roBa"

# このあたりの基本設定はマイコンの動作に必須なので【絶対に消さずに残す】
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# ---------------------------------------------------------
# トラックボールセンサーの切り替え設定
# ---------------------------------------------------------
# 元のPMW3610ドライバをオフにする
CONFIG_PMW3610=n

# 新しいPMW3320ドライバとマウス機能をオンにする
CONFIG_PMW3320=y
CONFIG_ZMK_MOUSE=y

# ⚠️ 注意：元のPMW3610用だった細かい設定（CONFIG_PMW3610_CPIなど）は、
# 残しておくとビルドエラーの原因になることがあるため、すべて削除（または先頭に # をつけてコメントアウト）してください。
